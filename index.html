<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정리수납 모의고사 시스템 (클라우드 연동)</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 나의 파이어베이스 설정
        const appId = '정리수납-2026-test-app'; 
        const firebaseConfig = {
            apiKey: "AIzaSyB6hs_mhjq8uZ_poJmUnMSFJv6cmsjDF3w",
            authDomain: "clearance-receipt.firebaseapp.com",
            projectId: "clearance-receipt",
            storageBucket: "clearance-receipt.firebasestorage.app",
            messagingSenderId: "1077793621751",
            appId: "1:1077793621751:web:788f28afdffc0c9e9bb5f2",
            measurementId: "G-GJQ0R8MRWL"
        };

        const isLocalMode = Object.keys(firebaseConfig).length === 0;
        let app, auth, db;
        if (!isLocalMode) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        window.dbSystem = { isReady: false, questionBank: [], domainRatios: {}, userId: null };

        function setupDataListeners() {
            if (isLocalMode) {
                window.dbSystem.isReady = true;
                document.getElementById('loading-screen').style.display = 'none';
                return;
            }
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'examData', 'main');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.dbSystem.questionBank = data.questionBank ? JSON.parse(data.questionBank) : [];
                    window.dbSystem.domainRatios = data.domainRatios || {};
                }
                window.dbSystem.isReady = true;
                document.getElementById('loading-screen').style.display = 'none';
                if (document.getElementById('view-teacher').classList.contains('active')) window.renderTeacherDashboard();
            });
        }

        if (!isLocalMode) {
            signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => { if (user) { window.dbSystem.userId = user.uid; setupDataListeners(); } });
        } else { setupDataListeners(); }

        window.saveDataToCloud = async function() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'examData', 'main');
            try {
                document.getElementById('saving-indicator').style.display = 'block';
                await setDoc(docRef, { questionBank: JSON.stringify(window.dbSystem.questionBank), domainRatios: window.dbSystem.domainRatios });
                document.getElementById('saving-indicator').style.display = 'none';
            } catch (error) { alert("저장 오류 발생"); document.getElementById('saving-indicator').style.display = 'none'; }
        };
    </script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; min-height: 500px; }
        .text-center { text-align: center; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 20px; font-size: 15px; font-weight: bold; transition: all 0.2s; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-warning { background-color: #f39c12; color: white; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; border-radius: 12px; }
        #saving-indicator { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; display: none; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .intro-box { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 50px; }
        .intro-btn { width: 250px; padding: 20px; font-size: 20px; border-radius: 10px; }
        .question-card { border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .domain-tag { display: inline-block; background: #ecf0f1; padding: 4px 10px; font-size: 13px; font-weight: bold; border-radius: 12px; margin-bottom: 10px; color: #7f8c8d; }
        .options { list-style: none; padding: 0; }
        .options label { display: block; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        .explanation { margin-top: 15px; padding: 15px; background-color: #e8f8f5; border-left: 4px solid #1abc9c; display: none; }
        .correct-answer-highlight { background-color: #d4edda !important; }
        .wrong-answer-highlight { background-color: #f8d7da !important; }
        .teacher-header { display: flex; justify-content: space-between; align-items: center; background-color: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .teacher-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ecf0f1; }
        .tab-btn { background: none; color: #7f8c8d; padding: 10px; }
        .tab-btn.active { color: #2c3e50; border-bottom: 3px solid #e74c3c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .domain-section { margin-bottom: 30px; border: 1px solid #bdc3c7; border-radius: 8px; }
        .domain-title { background-color: #ecf0f1; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .q-item { padding: 15px; border-top: 1px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen">데이터 연결 중...</div>
    
    <div id="view-intro" class="view-section active text-center">
        <h1>정리수납 모의고사 시스템</h1>
        <p>접속할 모드를 선택해 주세요.</p>
        <div class="intro-box">
            <button class="btn-primary intro-btn" onclick="switchView('view-student')">👨‍🎓 학생용 (문제 풀기)</button>
            <button class="btn-danger intro-btn" onclick="showLoginModal()">👩‍🏫 교사용 (문제 관리)</button>
        </div>
    </div>

    <div id="view-student" class="view-section">
        <div class="teacher-header no-print"><h2>📝 연습 모드</h2><button class="btn-secondary" onclick="switchView('view-intro')">처음으로</button></div>
        <div class="button-group no-print text-center"><button class="btn-primary" onclick="startTest(1)">1문제</button> <button class="btn-primary" onclick="startTest(5)">5문제</button> <button class="btn-warning" onclick="startTest(25, true)">25문제(실전)</button></div>
        <div id="timer" class="text-center" style="font-size:24px; color:red; margin:10px; display:none;">60:00</div>
        <div id="test-area"></div>
        <div class="text-center"><button id="submit-btn" class="btn-success" style="display:none; width:200px; margin-top:20px;" onclick="gradeTest()">채점하기</button></div>
        <div id="result-area" class="text-center" style="display:none; margin-top:30px;"><h2 id="score-text"></h2><button class="btn-primary" onclick="resetStudentView()">다시 풀기</button></div>
    </div>

    <div id="view-teacher" class="view-section no-print">
        <div class="teacher-header"><h2>⚙️ 교사용 관리</h2><button class="btn-secondary" onclick="switchView('view-intro')">로그아웃</button></div>
        <div class="teacher-tabs">
            <button class="tab-btn active" onclick="switchTeacherTab('tab-manage', this)">문제 관리</button>
            <button class="tab-btn" onclick="switchTeacherTab('tab-print', this)">인쇄</button>
            <button class="tab-btn" onclick="switchTeacherTab('tab-ratios', this)">비율 설정</button>
        </div>
        <div id="tab-manage" class="tab-content active">
            <div style="text-align:right; margin-bottom:10px;"><button class="btn-success" onclick="openQuestionModal()">+ 전체 추가</button></div>
            <div id="teacher-question-list"></div>
        </div>
        <div id="tab-print" class="tab-content">
            <h3>🖨️ 시험지 인쇄</h3>
            <input type="number" id="print-q-count" value="25" class="form-control" style="width:80px; display:inline;"> 문제 <button class="btn-primary" onclick="generatePrintPaper()">출력</button>
        </div>
        <div id="tab-ratios" class="tab-content">
            <h3>📊 출제 비율</h3>
            <div id="ratio-settings-area"></div>
            <button class="btn-success" onclick="saveRatios()">비율 저장</button>
        </div>
    </div>
</div>

<div id="login-modal" class="modal-overlay">
    <div class="modal-content text-center"><h3>비밀번호를 입력하세요</h3><input type="password" id="teacher-pwd" class="form-control" style="margin-bottom:15px;"><button class="btn-primary" onclick="verifyLogin()">확인</button> <button class="btn-secondary" onclick="closeLoginModal()">취소</button></div>
</div>

<div id="question-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">문제 추가</h3>
        <input type="hidden" id="q-id">
        <div class="form-group"><label>영역</label><input type="text" id="q-domain" class="form-control" list="domain-list"><datalist id="domain-list"></datalist></div>
        <div class="form-group"><label>문제</label><textarea id="q-text" class="form-control"></textarea></div>
        <div class="form-group"><label>보기1(정답)<input type="radio" name="q-answer" value="0" checked></label><input type="text" id="q-opt1" class="form-control"></div>
        <div class="form-group"><label>보기2<input type="radio" name="q-answer" value="1"></label><input type="text" id="q-opt2" class="form-control"></div>
        <div class="form-group"><label>보기3<input type="radio" name="q-answer" value="2"></label><input type="text" id="q-opt3" class="form-control"></div>
        <div class="form-group"><label>보기4<input type="radio" name="q-answer" value="4"></label><input type="text" id="q-opt4" class="form-control"></div>
        <div class="form-group"><label>해설</label><textarea id="q-exp" class="form-control"></textarea></div>
        <button class="btn-success" onclick="saveQuestion()">저장</button> <button class="btn-secondary" onclick="closeQuestionModal()">취소</button>
    </div>
</div>

<div id="saving-indicator">☁️ 저장 중...</div>

<script>
    function showLoginModal() { document.getElementById('login-modal').style.display='flex'; }
    function closeLoginModal() { document.getElementById('login-modal').style.display='none'; }
    function verifyLogin() { if(document.getElementById('teacher-pwd').value === '13123') { closeLoginModal(); switchView('view-teacher'); } else { alert("비밀번호 오류"); } }

    function switchView(id) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-teacher') window.renderTeacherDashboard();
    }

    function switchTeacherTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    window.renderTeacherDashboard = function() {
        let bank = window.dbSystem.questionBank;
        let grouped = {}; let domainSet = new Set();
        bank.forEach(q => { domainSet.add(q.domain); if(!grouped[q.domain]) grouped[q.domain]=[]; grouped[q.domain].push(q); });
        
        let html = '';
        for (let dom in grouped) {
            html += `<div class="domain-section"><h3 class="domain-title"><span>🏷️ ${dom}</span> <button class="btn-success" style="padding:4px 8px; font-size:12px;" onclick="openQuestionModal('${dom}')">+ 추가</button></h3><ul style="list-style:none; padding:0;">`;
            grouped[dom].forEach(q => { html += `<li class="q-item">${q.question} <div><button onclick="editQuestion(${q.id})">수정</button> <button onclick="deleteQuestion(${q.id})">삭제</button></div></li>`; });
            html += `</ul></div>`;
        }
        document.getElementById('teacher-question-list').innerHTML = html;
        let dl = ''; domainSet.forEach(d => dl += `<option value="${d}">`); document.getElementById('domain-list').innerHTML = dl;
        renderRatiosEditor(domainSet);
    }

    function renderRatiosEditor(set) {
        let html = ''; let ratios = window.dbSystem.domainRatios;
        set.forEach(d => { if(ratios[d]===undefined) ratios[d]=0; html += `<div class="form-group">${d}: <input type="number" step="0.1" class="ratio-input" data-domain="${d}" value="${ratios[d]}"></div>`; });
        document.getElementById('ratio-settings-area').innerHTML = html;
    }

    function saveRatios() { 
        document.querySelectorAll('.ratio-input').forEach(i => window.dbSystem.domainRatios[i.dataset.domain] = parseFloat(i.value));
        window.saveDataToCloud(); alert("저장됨");
    }

    // 영역별 추가 기능을 위해 파라미터(dom) 추가
    window.openQuestionModal = function(dom = "") {
        document.getElementById('modal-title').innerText = "문제 추가";
        document.getElementById('q-id').value = "";
        // 만약 특정 카테고리의 버튼을 눌렀다면 해당 영역을 넣어줌, 아니면 이전에 썼던 영역을 유지
        if(dom) document.getElementById('q-domain').value = dom;
        document.getElementById('q-text').value = "";
        document.getElementById('q-opt1').value = ""; document.getElementById('q-opt2').value = "";
        document.getElementById('q-opt3').value = ""; document.getElementById('q-opt4').value = "";
        document.getElementById('q-exp').value = "";
        document.getElementById('question-modal').style.display='flex';
    }

    function closeQuestionModal() { document.getElementById('question-modal').style.display='none'; }

    function editQuestion(id) {
        let q = window.dbSystem.questionBank.find(i => i.id === id);
        document.getElementById('modal-title').innerText = "문제 수정";
        document.getElementById('q-id').value = q.id;
        document.getElementById('q-domain').value = q.domain;
        document.getElementById('q-text').value = q.question;
        document.getElementById('q-opt1').value = q.options[0]; document.getElementById('q-opt2').value = q.options[1];
        document.getElementById('q-opt3').value = q.options[2]; document.getElementById('q-opt4').value = q.options[3];
        document.getElementById('q-exp').value = q.explanation;
        document.querySelector(`input[name="q-answer"][value="${q.answerIndex}"]`).checked = true;
        document.getElementById('question-modal').style.display='flex';
    }

    window.saveQuestion = function() {
        let id = document.getElementById('q-id').value;
        let domain = document.getElementById('q-domain').value;
        let newQ = {
            id: id ? parseInt(id) : Date.now(),
            domain: domain,
            question: document.getElementById('q-text').value,
            options: [document.getElementById('q-opt1').value, document.getElementById('q-opt2').value, document.getElementById('q-opt3').value, document.getElementById('q-opt4').value],
            answerIndex: parseInt(document.querySelector('input[name="q-answer"]:checked').value),
            explanation: document.getElementById('q-exp').value
        };
        if(id) { let idx = window.dbSystem.questionBank.findIndex(i => i.id == id); window.dbSystem.questionBank[idx] = newQ; }
        else { window.dbSystem.questionBank.push(newQ); }
        
        window.saveDataToCloud().then(() => {
            window.renderTeacherDashboard();
            // 연속 입력을 위해 ID와 문제 내용만 지우고 영역은 그대로 둠
            document.getElementById('q-id').value = "";
            document.getElementById('q-text').value = "";
            document.getElementById('q-opt1').value = ""; document.getElementById('q-opt2').value = "";
            document.getElementById('q-opt3').value = ""; document.getElementById('q-opt4').value = "";
            document.getElementById('q-exp').value = "";
            document.getElementById('q-text').focus(); // 바로 다음 문제 입력 가능하게 포커스
            alert("저장 완료! 다음 문제를 입력하세요.");
        });
    }

    function deleteQuestion(id) { if(confirm("삭제?")) { window.dbSystem.questionBank = window.dbSystem.questionBank.filter(i => i.id !== id); window.saveDataToCloud(); window.renderTeacherDashboard(); } }

    // --- 학생 풀기 로직 ---
    let curTest = []; let timer;
    function startTest(count, isMock=false) {
        resetStudentView();
        let bank = window.dbSystem.questionBank;
        if(bank.length < count) { alert("문제 부족"); return; }
        let selected = [...bank].sort(() => 0.5 - Math.random()).slice(0, count);
        curTest = selected.map(q => {
            let opts = q.options.map((t, i) => ({t, c: i === q.answerIndex}));
            opts.sort(() => 0.5 - Math.random());
            return { ...q, options: opts.map(o => o.t), answerIndex: opts.findIndex(o => o.c) };
        });
        let h = '';
        curTest.forEach((q, i) => {
            h += `<div class="question-card"><h3>${i+1}. ${q.question}</h3><ul class="options">`;
            q.options.forEach((o, oi) => h += `<li><label><input type="radio" name="q${i}" value="${oi}"> ${oi+1}) ${o}</label></li>`);
            h += `</ul><button onclick="document.getElementById('ex${i}').style.display='block'">해설</button><div id="ex${i}" class="explanation">정답: ${q.answerIndex+1}<br>${q.explanation}</div></div>`;
        });
        document.getElementById('test-area').innerHTML = h;
        document.getElementById('submit-btn').style.display='inline-block';
        if(isMock) startTimer();
    }
    function startTimer() { let s = 3600; document.getElementById('timer').style.display='block'; timer = setInterval(() => { s--; let m = Math.floor(s/60); let rs = s%60; document.getElementById('timer').innerText = `${m}:${rs.toString().padStart(2,'0')}`; if(s<=0) gradeTest(); }, 1000); }
    function gradeTest() {
        clearInterval(timer); let score = 0;
        curTest.forEach((q, i) => {
            let sel = document.querySelector(`input[name="q${i}"]:checked`);
            document.getElementById(`ex${i}`).style.display='block';
            if(sel && parseInt(sel.value) === q.answerIndex) score++;
        });
        let res = `${curTest.length}문제 중 ${score}개 정답.`;
        if(curTest.length === 25) res += score >= 17 ? " 🎉 합격입니다!" : " 😢 불합격입니다.";
        document.getElementById('score-text').innerHTML = res;
        document.getElementById('result-area').style.display='block';
        document.getElementById('submit-btn').style.display='none';
    }
    function resetStudentView() { document.getElementById('test-area').innerHTML = ''; document.getElementById('result-area').style.display='none'; document.getElementById('timer').style.display='none'; clearInterval(timer); }
    function generatePrintPaper() { window.print(); }
</script>
</body>
</html>
